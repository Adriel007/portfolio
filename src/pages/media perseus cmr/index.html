<html lang="pt-BR">
<!--
        Funcionando nos navegadores: Chrome, Edge, Opera, OperaGX, Safari, Firefox
        -->

<head>
        <meta charset="UTF-8">
        <title>Calculadora média nucleo comum | Portal Educacional</title>
        <link rel="stylesheet" href="styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.00">
</head>

<body>
        <h1>
                Informe suas notas
        </h1>
        <form method="post">
                <label for="exercicio">Exercícios</label>
                <br>
                <input id="exercicio" type="number" placeholder="Nota de exercícios">
                <br>
                <label for="licao">Lição de casa</label>
                <br>
                <input id="licao" type="number" placeholder="Nota de lição de casa">
                <br>
                <label for="mapa">Mapa conceitual</label>
                <br>
                <input id="mapa" type="number" placeholder="Nota de mapa conceitual">
                <br>
                <label for="participacao">Participação</label>
                <br>
                <input id="participacao" type="number" placeholder="Nota de participação">
                <br>
                <label for="prova">Prova bimestral</label>
                <br>
                <input id="prova" type="number" placeholder="Nota de prova bimestral">
                <br>
                <label for="simulado">Simulado</label>
                <br>
                <input id="simulado" type="number" placeholder="Nota de simulado">
                <br>
                <label for="trabalho">Trabalho bimestral</label>
                <br>
                <input id="trabalho" type="number" placeholder="Nota de trabalho bimestral">
                <br>
                <label for="media">Média</label>
                <br>
                <input id="media" type="number" placeholder="Sua média" readonly>
                <br>
                <input id="limpar" type="button" value="Limpar">
                <input id="calcular" type="button" value="Calcular">
        </form>
        <script src="scripts.js"></script>
</body>

</html>
