<html lang="pt-BR">
<!--
        Funcionando nos navegadores: Chrome, Edge, Opera, OperaGX, Safari, Firefox
        -->

<head>
        <meta charset="UTF-8">
        <title>Calculadora média técnico | Portal Educacional</title>
        <link rel="stylesheet" href="styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.00">
</head>

<body>
        <h1>
                Informe suas notas
        </h1>
        <form method="post">
                <label for="prova">Prova</label>
                <br>
                <input id="prova" type="number" placeholder="Nota de prova">
                <br>
                <label for="relatorio">Relatório de tarefa</label>
                <br>
                <input id="relatorio" type="number" placeholder="Nota de relatório de tarefa">
                <br>
                <label for="tarefa">Tarefa</label>
                <br>
                <input id="tarefa" type="number" placeholder="Nota de tarefa">
                <br>
                <label for="exerciciotic">Exercício TIC</label>
                <br>
                <input id="exerciciotic" type="number" placeholder="Nota de exercício">
                <br>
                <label for="trabalho">Trabalho</label>
                <br>
                <input id="trabalho" type="number" placeholder="Nota de trabalho">
                <br>
                <label for="media">Média</label>
                <br>
                <input id="media" type="number" placeholder="Sua média" readonly>
                <br>
                <input id="limpar" type="button" value="Limpar">
                <input id="calcular" type="button" value="Calcular">
        </form>
        <script src="scripts.js"></script>
</body>

</html>
