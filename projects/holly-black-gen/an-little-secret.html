      #login input[type="button"] {

        font-size: 1.5em;
        background-color: #333;
        color: limegreen;
        border: none;
        outline: none;
        margin-top: 10px;
      }
      #login input[type="button"]:hover {
        cursor: pointer;
      }

      .tuba {
        width: 300px;
        height: 300px;
        animation: spin 2s linear infinite;
      }

      .tuba:hover {
        cursor: pointer;
      }

      #som {
        display: none;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

  <script>
    const password = document.getElementById("password");
    let i = 0;

    function login() {
      if (password.value === "04/12/2023") {
        const screen = document.getElementById("login");
        screen.remove();
        setTimeout(() => {
          alert("Clique nos tuba e ouça!");
        }, 2000);
      } else {
        alert("Wrong password");
        password.value = "";
      }
    }

    const tubas = document.querySelectorAll(".tuba");
    const som = document.getElementById("som");

    tubas.forEach((tuba) => {
      tuba.addEventListener("click", () => {
        if (i === 0) {
          alert("Eu te amo, eu não esqueci, feliz 5 meses :) ❤️");
          i++;
        }
        const soundSrc = tuba.getAttribute("data-src");
        som.src = soundSrc;
        som.play();
      });
    });

    password.focus();
  </script>
