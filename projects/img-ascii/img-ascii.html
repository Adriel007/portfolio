<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./img-ascii.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.00">
</head>

<body>
    <span>ASCII copied to clipboard</span>
    <div id="container"></div>
    <h3>Insert an image:</h3>
    <input type="file" onchange="main()">
    <h3>Insert matrix size:</h3>
    <div>
        <label>Columns:</label>
        <input type="number" value="100" max="100" oninput="cols = this.value">
    </div>
    <div>
        <label>Rows:</label>
        <input type="number" value="100" max="100" oninput="rows = this.value">
    </div>
    <h3>ASCII:</h3>
    <div id="container">
        <textarea></textarea>
        <button onclick="copy()">Copy</button>
    </div>
    <script src="./img-ascii.js"></script>
</body>

</html>
