<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./img-ascii.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.00">
</head>

<body>
    <span>ASCII copied to clipboard</span>
    <div id="h-group">
        <h3>Insert an image:</h3>
        <h3>Insert matrix size:</h3>
    </div>
    <div id="i-group">
        <input type="file" onchange="main()">
        <div id="xy-group">
            <div>
                <label>Columns:</label>
                <input type="number" value="75" max="200" oninput="cols = this.value">
            </div>
            <div>
                <label>Rows:</label>
                <input type="number" value="75" max="200" oninput="rows = this.value">
            </div>
        </div>
    </div>

    <div id="container">
        <h3>ASCII:</h3>
        <textarea></textarea>
        <button onclick="copy()">Copy</button>
    </div>
    <script src="./img-ascii.js"></script>
</body>

</html>
