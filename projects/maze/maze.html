<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./maze.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.00">
</head>

<body>
    <div id="game"></div>
    <div id="options">
        <div>
            <label>Rows:</label>
            <button onclick="options('rows', -1)">-</button>
            <button onclick="options('rows', 1)">+</button>

        </div>
        <div>
            <label>Columns:</label>
            <button onclick="options('cols', -1)">-</button>
            <button onclick="options('cols', 1)">+</button>
        </div>
        <button class="matrixOpt" onclick="options('mode', 'wall', this)">Wall</button>
        <button class="matrixOpt" onclick="options('mode', 'floor', this)">Floor</button>
        <button class="matrixOpt" onclick="options('mode', 'spawn', this)">Spawn</button>
        <button class="matrixOpt" onclick="options('mode', 'final', this)">End</button>
        <button class="matrixOpt" onclick="options('mode', '', this)">Remove</button>
        <h3>Click on the buttons and the grid plane to add elements</h3>
    </div>
    <script src="./maze.js"></script>
</body>

</html>
